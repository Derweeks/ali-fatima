<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>علي وفاطمة 🤍</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');

  :root {
    --bg: #060f0f;
    --bg2: #0a1a1a;
    --bg3: #0d2222;
    --card: #0e1e1e;
    --border: #1a3a3a;
    --border2: #2a6060;
    --teal: #3dd6c8;
    --teal2: #7eeee6;
    --teal3: #b2f5f0;
    --gold: #f0c060;
    --green: #6fcf97;
    --blue: #7eb8f7;
    --text: #eef8f8;
    --text2: #8abfbf;
    --text3: #4a8080;
    /* keep pink vars mapped to teal for compatibility */
    --pink: #3dd6c8;
    --pink2: #7eeee6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* ===== STARS ===== */
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .star { position: absolute; border-radius: 50%; animation: twinkle var(--d,3s) infinite alternate; opacity: 0; }
  @keyframes twinkle { 0% { opacity: 0; } 100% { opacity: var(--o,0.6); } }

  /* ===== LAYOUT ===== */
  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

  /* ===== HEADER ===== */
  header {
    text-align: center; padding: 2.2rem 1rem 1.2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .header-hearts-row {
    display: flex; align-items: center; justify-content: center;
    gap: 0; margin-bottom: 0.3rem;
  }

  .header-name {
    font-size: 1.5rem; font-weight: 700; letter-spacing: 1px;
  }
  .header-name.ali   { color: #ffffff; }
  .header-name.fatima { color: var(--teal2); }

  .hearts-line {
    display: flex; align-items: center; gap: 0; position: relative;
    margin: 0 6px;
  }
  .h-heart {
    font-size: 1rem;
    animation: pulse 1.8s ease-in-out infinite;
    display: inline-block;
  }
  .h-heart.left  { color: #fff;           animation-delay: 0s; }
  .h-heart.mid   { color: var(--teal);    animation-delay: 0.3s; font-size: 1.3rem; }
  .h-heart.right { color: var(--teal2);   animation-delay: 0.6s; }

  .h-line {
    width: 28px; height: 1.5px;
    background: linear-gradient(90deg, rgba(255,255,255,0.4), var(--teal), rgba(126,238,230,0.4));
  }

  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }

  .header-subtitle {
    font-size: 0.72rem; color: var(--text3); margin-top: 0.2rem;
    letter-spacing: 3px; font-weight: 300;
  }
  .header-date { font-size: 0.78rem; color: var(--text3); margin-top: 6px; }

  /* ===== MESSAGE BANNER ===== */
  .msg-banner {
    margin: 1rem; border-radius: 16px;
    background: linear-gradient(135deg, #2d1535, #1a0d25);
    border: 1px solid var(--border2);
    overflow: hidden;
  }
  .msg-banner-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.7rem 1rem; background: rgba(232,103,127,0.1);
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem; color: var(--text3);
  }
  .msg-banner-from { font-size: 0.75rem; color: var(--pink); font-weight: 500; }
  .msg-banner-text { padding: 1rem; font-size: 0.95rem; color: var(--text); line-height: 1.7; }
  .msg-input-row {
    display: flex; gap: 8px; padding: 0.8rem 1rem;
    border-top: 1px solid var(--border);
  }
  .msg-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.5rem 0.8rem;
    color: var(--text); font-family: 'Tajawal', sans-serif;
    font-size: 0.9rem; outline: none;
  }
  .msg-input:focus { border-color: var(--pink); }
  .msg-input::placeholder { color: var(--text3); }
  .msg-send-btn {
    background: var(--pink); border: none; border-radius: 10px;
    padding: 0.5rem 1rem; color: #fff; cursor: pointer;
    font-family: 'Tajawal', sans-serif; font-size: 0.85rem;
    font-weight: 500; transition: opacity 0.2s;
  }
  .msg-send-btn:hover { opacity: 0.85; }

  /* ===== SECTIONS ===== */
  .section { margin: 1rem; }
  .section-title {
    font-size: 0.75rem; color: var(--text3); text-transform: uppercase;
    letter-spacing: 3px; margin-bottom: 0.8rem; font-weight: 400;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ===== TASK CARD ===== */
  .task-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; margin-bottom: 0.8rem; overflow: hidden;
    transition: border-color 0.2s;
  }
  .task-card:hover { border-color: var(--border2); }

  .task-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 1rem 0.5rem;
  }
  .task-name { font-size: 0.95rem; font-weight: 500; color: var(--text); }
  .task-type-badge {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 20px;
    font-weight: 400;
  }
  .badge-tasbih { background: #2d1535; color: var(--pink2); }
  .badge-quran  { background: #1a2515; color: var(--green); }
  .badge-athkar { background: #15202d; color: var(--blue); }
  .badge-check  { background: #2d2515; color: var(--gold); }

  /* TASBIH PROGRESS */
  .tasbih-body { padding: 0.5rem 1rem 1rem; }
  .progress-bar-wrap {
    background: var(--bg3); border-radius: 10px; height: 8px;
    margin-bottom: 0.5rem; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, var(--pink), var(--gold));
    transition: width 0.5s ease;
  }
  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 0.8rem; color: var(--text3); margin-bottom: 0.8rem;
  }
  .progress-remaining { color: var(--pink2); font-weight: 500; }

  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .count-btn {
    flex: 1; min-width: 60px; padding: 0.5rem;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text2);
    cursor: pointer; font-family: 'Tajawal', sans-serif;
    font-size: 0.85rem; transition: all 0.15s; text-align: center;
  }
  .count-btn:hover { background: var(--border); color: var(--text); }
  .count-btn.primary { background: rgba(232,103,127,0.15); border-color: var(--pink); color: var(--pink2); }

  .who-added { font-size: 0.72rem; color: var(--text3); margin-top: 0.5rem; text-align: left; }

  /* CHECKBOX TASK */
  .check-body { padding: 0.5rem 1rem 1rem; }
  .check-persons { display: flex; gap: 1rem; }
  .check-person {
    flex: 1; display: flex; align-items: center; gap: 10px;
    padding: 0.6rem 0.8rem; border-radius: 10px;
    background: var(--bg3); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .check-person.done { background: rgba(111,207,151,0.1); border-color: var(--green); }
  .check-circle {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border2); display: flex;
    align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0; transition: all 0.2s;
  }
  .check-person.done .check-circle { background: var(--green); border-color: var(--green); color: #fff; }
  .check-person-name { font-size: 0.85rem; color: var(--text2); }
  .check-person.done .check-person-name { color: var(--green); }

  /* QURAN TASK */
  .quran-body { padding: 0.5rem 1rem 1rem; }
  .quran-total {
    font-size: 1.4rem; font-weight: 700; color: var(--green);
    text-align: center; margin-bottom: 0.5rem;
  }
  .quran-sub { font-size: 0.75rem; color: var(--text3); text-align: center; margin-bottom: 0.8rem; }
  .quran-persons { display: flex; gap: 0.5rem; }
  .quran-person { flex: 1; text-align: center; }
  .quran-person-name { font-size: 0.75rem; color: var(--text3); margin-bottom: 4px; }
  .quran-person-count { font-size: 1.1rem; color: var(--text); font-weight: 500; }
  .quran-add-row { display: flex; gap: 6px; margin-top: 0.8rem; }
  .quran-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.45rem 0.7rem;
    color: var(--text); font-family: 'Tajawal', sans-serif;
    font-size: 0.85rem; outline: none;
  }
  .quran-input:focus { border-color: var(--green); }
  .quran-input::placeholder { color: var(--text3); }
  .quran-btn {
    padding: 0.45rem 0.9rem; background: rgba(111,207,151,0.15);
    border: 1px solid var(--green); border-radius: 8px;
    color: var(--green); cursor: pointer;
    font-family: 'Tajawal', sans-serif; font-size: 0.85rem;
    transition: opacity 0.2s;
  }
  .quran-btn:hover { opacity: 0.8; }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(15,10,15,0.95); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; z-index: 100;
  }
  .nav-btn {
    flex: 1; padding: 0.8rem 0.5rem; text-align: center;
    cursor: pointer; border: none; background: transparent;
    color: var(--text3); font-family: 'Tajawal', sans-serif;
    font-size: 0.7rem; transition: color 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .nav-btn.active { color: var(--pink); }
  .nav-btn svg { width: 20px; height: 20px; }

  /* ===== PAGES ===== */
  .page { display: none; }
  .page.active { display: block; }

  /* ===== ADMIN PAGE ===== */
  .admin-login {
    margin: 2rem 1rem; text-align: center;
  }
  .admin-login h2 { font-size: 1.1rem; color: var(--text2); margin-bottom: 1.5rem; }
  .admin-pin-input {
    width: 100%; max-width: 200px; text-align: center;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.8rem;
    color: var(--text); font-family: 'Tajawal', sans-serif;
    font-size: 1.2rem; letter-spacing: 6px; outline: none;
    margin-bottom: 1rem;
  }
  .admin-pin-input:focus { border-color: var(--pink); }
  .admin-enter-btn {
    display: block; width: 100%; max-width: 200px; margin: 0 auto;
    padding: 0.7rem; background: var(--pink); border: none;
    border-radius: 12px; color: #fff; cursor: pointer;
    font-family: 'Tajawal', sans-serif; font-size: 0.95rem; font-weight: 500;
  }
  .admin-error { color: var(--pink); font-size: 0.85rem; margin-top: 0.5rem; }

  .admin-panel { padding: 1rem; }
  .admin-panel h2 { font-size: 1rem; color: var(--text2); margin-bottom: 1.5rem; text-align: center; }

  .add-task-form {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.2rem; margin-bottom: 1rem;
  }
  .add-task-form h3 { font-size: 0.85rem; color: var(--text3); margin-bottom: 1rem; font-weight: 400; letter-spacing: 2px; }

  .form-group { margin-bottom: 0.8rem; }
  .form-label { font-size: 0.8rem; color: var(--text3); margin-bottom: 4px; display: block; }
  .form-input, .form-select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.55rem 0.8rem;
    color: var(--text); font-family: 'Tajawal', sans-serif;
    font-size: 0.9rem; outline: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--pink); }
  .form-input::placeholder { color: var(--text3); }
  .form-select option { background: var(--bg2); }

  .form-submit {
    width: 100%; padding: 0.7rem; background: rgba(232,103,127,0.2);
    border: 1px solid var(--pink); border-radius: 10px;
    color: var(--pink2); cursor: pointer;
    font-family: 'Tajawal', sans-serif; font-size: 0.9rem;
    font-weight: 500; transition: all 0.2s; margin-top: 0.5rem;
  }
  .form-submit:hover { background: rgba(232,103,127,0.35); }

  .existing-tasks h3 { font-size: 0.8rem; color: var(--text3); letter-spacing: 2px; margin-bottom: 0.8rem; font-weight: 400; }
  .admin-task-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.7rem 0.9rem; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px; margin-bottom: 0.5rem;
  }
  .admin-task-name { font-size: 0.9rem; }
  .delete-btn {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 1.1rem; padding: 2px 6px;
    transition: color 0.2s;
  }
  .delete-btn:hover { color: var(--pink); }

  /* WHO AM I selector */
  .who-selector {
    display: flex; gap: 8px; margin: 1rem; padding: 1rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; align-items: center;
  }
  .who-label { font-size: 0.8rem; color: var(--text3); flex-shrink: 0; }
  .who-btn {
    flex: 1; padding: 0.5rem; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); background: transparent;
    color: var(--text2); font-family: 'Tajawal', sans-serif;
    font-size: 0.85rem; transition: all 0.2s;
  }
  .who-btn.active { background: rgba(232,103,127,0.2); border-color: var(--pink); color: var(--pink2); }

  /* STREAK / STATS */
  .stats-row { display: flex; gap: 8px; margin: 0 1rem 1rem; }
  .stat-box {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.8rem; text-align: center;
  }
  .stat-num { font-size: 1.4rem; font-weight: 700; color: var(--pink2); }
  .stat-lbl { font-size: 0.7rem; color: var(--text3); margin-top: 2px; }

  .loading { text-align: center; padding: 3rem; color: var(--text3); }
  .empty-state { text-align: center; padding: 2rem; color: var(--text3); font-size: 0.9rem; }

  .reset-day-btn {
    width: calc(100% - 2rem); margin: 0 1rem 1rem;
    padding: 0.7rem; background: transparent;
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text3); cursor: pointer;
    font-family: 'Tajawal', sans-serif; font-size: 0.85rem;
    transition: all 0.2s;
  }
  .reset-day-btn:hover { border-color: var(--border2); color: var(--text2); }
</style>
</head>
<body>

<div id="stars"></div>

<!-- FIRST TIME: CHOOSE IDENTITY -->
<div id="identityScreen" style="display:none;position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;">
  <div style="font-size:2rem;margin-bottom:0.5rem;">♥</div>
  <div style="font-size:1.3rem;font-weight:700;color:var(--teal2);margin-bottom:0.3rem;">مرحباً</div>
  <div style="font-size:0.85rem;color:var(--text3);margin-bottom:2.5rem;letter-spacing:1px;">من أنت؟</div>
  <div style="display:flex;gap:1rem;width:100%;max-width:280px;">
    <button onclick="chooseIdentity('ali')" style="flex:1;padding:1.2rem;border-radius:14px;border:1.5px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.05);color:#fff;font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:700;cursor:pointer;transition:all 0.2s;">علي</button>
    <button onclick="chooseIdentity('fatima')" style="flex:1;padding:1.2rem;border-radius:14px;border:1.5px solid var(--teal);background:rgba(61,214,200,0.08);color:var(--teal2);font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:700;cursor:pointer;transition:all 0.2s;">فاطمة</button>
  </div>
  <div style="font-size:0.72rem;color:var(--text3);margin-top:1.5rem;">هاد الاختيار دائم على هالجهاز</div>
</div>

<div class="app">

  <!-- PAGE: HOME -->
  <div class="page active" id="pageHome">
    <header>
      <div class="header-hearts-row">
        <span class="header-name ali">علي</span>
        <div class="hearts-line">
          <span class="h-heart left">♥</span>
          <div class="h-line"></div>
          <span class="h-heart mid">♥</span>
          <div class="h-line"></div>
          <span class="h-heart right">♥</span>
        </div>
        <span class="header-name fatima">فاطمة</span>
      </div>
      <div class="header-subtitle">على حب النورين</div>
      <div class="header-date" id="todayDate"></div>
    </header>

    <!-- RECEIVED MESSAGE (from other person) -->
    <div id="receivedMsgBox" style="margin:1rem;border-radius:16px;background:var(--card);border:1px solid var(--border);overflow:hidden;">
      <div style="display:flex;align-items:center;gap:8px;padding:0.65rem 1rem;border-bottom:1px solid var(--border);background:rgba(61,214,200,0.05);">
        <span style="font-size:0.8rem;color:var(--text3);">💌 رسالة من</span>
        <span id="msgFrom" style="font-size:0.8rem;color:var(--teal);font-weight:500;"></span>
      </div>
      <div id="msgText" style="padding:1rem;font-size:0.95rem;color:var(--text);line-height:1.7;min-height:60px;font-style:italic;color:var(--text2);">لا توجد رسالة بعد...</div>
    </div>

    <!-- SEND MESSAGE (my message) -->
    <div style="margin:0 1rem 1rem;border-radius:16px;background:var(--card);border:1px solid var(--border);overflow:hidden;">
      <div style="padding:0.65rem 1rem;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.03);">
        <span style="font-size:0.8rem;color:var(--text3);">✏️ رسالتي لـ <span id="myMsgTo" style="color:var(--teal2);"></span></span>
      </div>
      <div id="myMsgPreview" style="padding:0.8rem 1rem;font-size:0.9rem;color:var(--text3);font-style:italic;display:none;"></div>
      <div style="display:flex;gap:8px;padding:0.8rem;">
        <input class="msg-input" id="msgInput" placeholder="اكتب رسالتك..." maxlength="200" style="flex:1;">
        <button class="msg-send-btn" onclick="sendMessage()">أرسل</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row" id="statsRow">
      <div class="stat-box">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-lbl">إجمالي التسبيح</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statDone">0</div>
        <div class="stat-lbl">مكتملة اليوم</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statQuran">0</div>
        <div class="stat-lbl">صفحات القرآن</div>
      </div>
    </div>

    <!-- TASKS -->
    <div class="section">
      <div class="section-title">العبادات والأعمال</div>
      <div id="tasksList"><div class="loading">جاري التحميل...</div></div>
    </div>

    <button class="reset-day-btn" onclick="resetDay()">🔄 إعادة تعيين اليوم (الأذكار والصلوات)</button>
  </div>

  <!-- PAGE: ADMIN -->
  <div class="page" id="pageAdmin">
    <header>
      <div class="header-name ali" style="font-size:1.1rem">لوحة الإدارة</div>
    </header>

    <div id="adminLoginSection" class="admin-login">
      <h2>أدخل كلمة السر</h2>
      <input class="admin-pin-input" type="password" id="pinInput" placeholder="••••" maxlength="10"
        onkeydown="if(event.key==='Enter')checkPin()">
      <button class="admin-enter-btn" onclick="checkPin()">دخول</button>
      <div class="admin-error" id="pinError"></div>
    </div>

    <div id="adminPanelSection" class="admin-panel" style="display:none">
      <h2>⚙️ إدارة المحتوى</h2>

      <div class="add-task-form">
        <h3>إضافة عمل جديد</h3>
        <div class="form-group">
          <label class="form-label">الاسم</label>
          <input class="form-input" id="newTaskName" placeholder="مثال: سبحان الله">
        </div>
        <div class="form-group">
          <label class="form-label">النوع</label>
          <select class="form-select" id="newTaskType" onchange="onTypeChange()">
            <option value="tasbih">تسبيح (بهدف مشترك)</option>
            <option value="check">صندوق تحقق (يومي)</option>
            <option value="quran">قراءة قرآن (صفحات)</option>
            <option value="athkar">ذكر (checkbox يومي)</option>
          </select>
        </div>
        <div class="form-group" id="targetGroup">
          <label class="form-label">الهدف الإجمالي</label>
          <input class="form-input" id="newTaskTarget" type="number" placeholder="مثال: 1000">
        </div>
        <button class="form-submit" onclick="addTask()">+ إضافة</button>
      </div>

      <div class="existing-tasks">
        <h3>الأعمال الحالية</h3>
        <div id="adminTasksList"></div>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('home',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    الرئيسية

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, update, remove, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2AQl_d8wKl-PswWWbG158oFsYnXgBaAU",
  authDomain: "ali-fatima.firebaseapp.com",
  databaseURL: "https://ali-fatima-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ali-fatima",
  storageBucket: "ali-fatima.firebasestorage.app",
  messagingSenderId: "264008952559",
  appId: "1:264008952559:web:5d481b53a35db7001a091a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== STATE =====
let who = localStorage.getItem('who') || 'ali';
let tasks = {};
let adminLoggedIn = false;
const ADMIN_PIN = '3175';
const NAMES = { ali: 'علي', fatima: 'فاطمة' };

// ===== STARS =====
function makeStars() {
  const c = document.getElementById('stars');
  const colors = ['#ffffff','#ffffff','#3dd6c8','#7eeee6','#b2f5f0'];
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    const col = colors[Math.floor(Math.random()*colors.length)];
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;
      background:${col};--d:${2+Math.random()*4}s;--o:${0.2+Math.random()*0.6};animation-delay:${Math.random()*4}s`;
    c.appendChild(s);
  }
}
makeStars();

// ===== DATE =====
function setDate() {
  const d = new Date();
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('todayDate').textContent = d.toLocaleDateString('ar-LB', opts);
}

// ===== IDENTITY (first time only) =====


window.chooseIdentity = function(w) {
  localStorage.setItem('who', w);
  who = w;
  document.getElementById('identityScreen').style.display = 'none';
  initApp();
};

if (!who) {
  document.getElementById('identityScreen').style.display = 'flex';
} else {
  document.getElementById('identityScreen').style.display = 'none';
  initApp();
}

function initApp() {
  setDate();
  const other = who === 'ali' ? 'fatima' : 'ali';
  document.getElementById('myMsgTo').textContent = NAMES[other];
  loadMessage();
  loadMyMessage();
  onValue(ref(db, 'tasks'), snap => {
    tasks = snap.val() || {};
    renderTasks();
    updateStats();
    if (adminLoggedIn) renderAdminTasks();
  });
}

window.showPage = function(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');
  btn.classList.add('active');
  if (page === 'admin') renderAdminTasks();
};

// ===== MESSAGE =====
function loadMessage() {
  const other = who === 'ali' ? 'fatima' : 'ali';
  onValue(ref(db, 'messages/' + other), snap => {
    const data = snap.val();
    if (data && data.text) {
      document.getElementById('msgText').textContent = data.text;
      document.getElementById('msgText').style.color = 'var(--text)';
      document.getElementById('msgFrom').textContent = NAMES[other];
    } else {
      document.getElementById('msgText').textContent = 'لا توجد رسالة بعد...';
      document.getElementById('msgText').style.color = 'var(--text3)';
    }
  });
}

function loadMyMessage() {
  onValue(ref(db, 'messages/' + who), snap => {
    const data = snap.val();
    const preview = document.getElementById('myMsgPreview');
    if (data && data.text) {
      preview.textContent = '✓ ' + data.text;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  });
}

window.sendMessage = function() {
  const txt = document.getElementById('msgInput').value.trim();
  if (!txt) return;
  set(ref(db, 'messages/' + who), { text: txt, from: who, time: Date.now() });
  document.getElementById('msgInput').value = '';
};

// ===== TASKS LISTENER =====

// ===== RENDER TASKS =====
function renderTasks() {
  const list = document.getElementById('tasksList');
  const keys = Object.keys(tasks);
  if (!keys.length) {
    list.innerHTML = '<div class="empty-state">لا توجد أعمال بعد<br><small>الأدمن يقدر يضيف من لوحة الإدارة</small></div>';
    return;
  }
  list.innerHTML = keys.map(id => renderTask(id, tasks[id])).join('');
}

function renderTask(id, t) {
  if (t.type === 'tasbih') return renderTasbih(id, t);
  if (t.type === 'check' || t.type === 'athkar') return renderCheck(id, t);
  if (t.type === 'quran') return renderQuran(id, t);
  return '';
}

function renderTasbih(id, t) {
  const total = (t.counts && t.counts.ali || 0) + (t.counts && t.counts.fatima || 0);
  const target = t.target || 1000;
  const pct = Math.min(100, Math.round(total / target * 100));
  const remaining = Math.max(0, target - total);
  const aliCount = t.counts && t.counts.ali || 0;
  const fatCount = t.counts && t.counts.fatima || 0;
  return `<div class="task-card">
    <div class="task-header">
      <span class="task-name">${t.name}</span>
      <span class="task-type-badge badge-tasbih">تسبيح</span>
    </div>
    <div class="tasbih-body">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-info">
        <span>${total} / ${target}</span>
        <span class="progress-remaining">باقي ${remaining}</span>
      </div>
      <div style="font-size:0.75rem;color:var(--text3);margin-bottom:0.7rem">
        علي: ${aliCount} &nbsp;|&nbsp; فاطمة: ${fatCount}
      </div>
      <div class="btn-row">
        <button class="count-btn" onclick="addCount('${id}',10)">+10</button>
        <button class="count-btn" onclick="addCount('${id}',33)">+33</button>
        <button class="count-btn primary" onclick="addCount('${id}',100)">+100</button>
        <button class="count-btn" onclick="addCustomCount('${id}')">+عدد</button>
      </div>
    </div>
  </div>`;
}

function renderCheck(id, t) {
  const aliDone = t.checks && t.checks.ali;
  const fatDone = t.checks && t.checks.fatima;
  const badgeClass = t.type === 'athkar' ? 'badge-athkar' : 'badge-check';
  const badgeTxt  = t.type === 'athkar' ? 'ذكر' : 'تحقق';
  return `<div class="task-card">
    <div class="task-header">
      <span class="task-name">${t.name}</span>
      <span class="task-type-badge ${badgeClass}">${badgeTxt}</span>
    </div>
    <div class="check-body">
      <div class="check-persons">
        <div class="check-person ${aliDone?'done':''}" onclick="toggleCheck('${id}','ali')">
          <div class="check-circle">${aliDone?'✓':''}</div>
          <span class="check-person-name">علي</span>
        </div>
        <div class="check-person ${fatDone?'done':''}" onclick="toggleCheck('${id}','fatima')">
          <div class="check-circle">${fatDone?'✓':''}</div>
          <span class="check-person-name">فاطمة</span>
        </div>
      </div>
    </div>
  </div>`;
}

function renderQuran(id, t) {
  const aliP = t.pages && t.pages.ali || 0;
  const fatP = t.pages && t.pages.fatima || 0;
  const total = aliP + fatP;
  return `<div class="task-card">
    <div class="task-header">
      <span class="task-name">${t.name}</span>
      <span class="task-type-badge badge-quran">قرآن</span>
    </div>
    <div class="quran-body">
      <div class="quran-total">${total} صفحة</div>
      <div class="quran-sub">إجمالي ما قرأتموه</div>
      <div class="quran-persons">
        <div class="quran-person">
          <div class="quran-person-name">علي</div>
          <div class="quran-person-count">${aliP}</div>
        </div>
        <div class="quran-person">
          <div class="quran-person-name">فاطمة</div>
          <div class="quran-person-count">${fatP}</div>
        </div>
      </div>
      <div class="quran-add-row">
        <input class="quran-input" id="qInput_${id}" type="number" placeholder="أضف صفحات...">
        <button class="quran-btn" onclick="addPages('${id}')">أضف</button>
      </div>
    </div>
  </div>`;
}

// ===== STATS =====
function updateStats() {
  let totalTasbih = 0, doneChecks = 0, quranPages = 0;
  Object.values(tasks).forEach(t => {
    if (t.type === 'tasbih') {
      totalTasbih += (t.counts && t.counts.ali || 0) + (t.counts && t.counts.fatima || 0);
    }
    if (t.type === 'check' || t.type === 'athkar') {
      if (t.checks && t.checks.ali) doneChecks++;
      if (t.checks && t.checks.fatima) doneChecks++;
    }
    if (t.type === 'quran') {
      quranPages += (t.pages && t.pages.ali || 0) + (t.pages && t.pages.fatima || 0);
    }
  });
  document.getElementById('statTotal').textContent = totalTasbih.toLocaleString('ar');
  document.getElementById('statDone').textContent = doneChecks;
  document.getElementById('statQuran').textContent = quranPages;
}

// ===== ACTIONS =====
window.addCount = function(id, n) {
  const cur = tasks[id]?.counts?.[who] || 0;
  update(ref(db, `tasks/${id}/counts`), { [who]: cur + n });
};

window.addCustomCount = function(id) {
  const n = parseInt(prompt('أدخل العدد:'));
  if (!isNaN(n) && n > 0) addCount(id, n);
};

window.toggleCheck = function(id, person) {
  if (person !== who) return; // only toggle your own
  const cur = tasks[id]?.checks?.[person];
  update(ref(db, `tasks/${id}/checks`), { [person]: !cur });
};

window.addPages = function(id) {
  const inp = document.getElementById('qInput_' + id);
  const n = parseInt(inp.value);
  if (isNaN(n) || n <= 0) return;
  const cur = tasks[id]?.pages?.[who] || 0;
  update(ref(db, `tasks/${id}/pages`), { [who]: cur + n });
  inp.value = '';
};

window.resetDay = function() {
  if (!confirm('إعادة تعيين الأذكار والصلوات لليوم؟')) return;
  Object.keys(tasks).forEach(id => {
    const t = tasks[id];
    if (t.type === 'check' || t.type === 'athkar') {
      set(ref(db, `tasks/${id}/checks`), { ali: false, fatima: false });
    }
  });
};

// ===== ADMIN =====
window.checkPin = function() {
  const pin = document.getElementById('pinInput').value;
  if (pin === ADMIN_PIN) {
    adminLoggedIn = true;
    document.getElementById('adminLoginSection').style.display = 'none';
    document.getElementById('adminPanelSection').style.display = 'block';
    renderAdminTasks();
  } else {
    document.getElementById('pinError').textContent = 'كلمة السر غلط!';
  }
};

window.onTypeChange = function() {
  const t = document.getElementById('newTaskType').value;
  document.getElementById('targetGroup').style.display = t === 'tasbih' ? 'block' : 'none';
};
onTypeChange();

window.addTask = function() {
  const name = document.getElementById('newTaskName').value.trim();
  const type = document.getElementById('newTaskType').value;
  const target = parseInt(document.getElementById('newTaskTarget').value) || 1000;
  if (!name) return alert('أدخل الاسم');
  const obj = { name, type };
  if (type === 'tasbih') obj.target = target;
  push(ref(db, 'tasks'), obj);
  document.getElementById('newTaskName').value = '';
  document.getElementById('newTaskTarget').value = '';
};

function renderAdminTasks() {
  const el = document.getElementById('adminTasksList');
  const keys = Object.keys(tasks);
  if (!keys.length) { el.innerHTML = '<div class="empty-state">لا توجد أعمال</div>'; return; }
  el.innerHTML = keys.map(id => `
    <div class="admin-task-item">
      <span class="admin-task-name">${tasks[id].name} <small style="color:var(--text3)">(${tasks[id].type})</small></span>
      <button class="delete-btn" onclick="deleteTask('${id}')">🗑</button>
    </div>`).join('');
}

window.deleteTask = function(id) {
  if (confirm('حذف هذا العمل؟')) remove(ref(db, 'tasks/' + id));
};

</script>
</body>
</html>
